<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluxograma — Jogo PsyBot</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="barra-topo">
    <div class="barra-topo-conteudo">
      <h1>Fluxograma — Jogo PsyBot</h1>
      <p>Roteiro de progressão do jogo: do tutorial à entidade final</p>
    </div>
    <nav class="nav-paginas">
      <a href="../index.html" class="nav-link">Cogni</a>
      <a href="index.html" class="nav-link nav-link--ativo">PsyBot</a>
    </nav>
    <button id="btn-download" type="button" class="btn-download">
      Baixar como PDF
    </button>
  </header>

  <main class="whiteboard" id="whiteboard">
    <div class="whiteboard-conteudo" id="whiteboard-conteudo">

      <section class="legenda-tipos" aria-label="Legenda dos símbolos">
        <h2>Legenda dos símbolos</h2>
        <div class="legenda-grid">
          <div class="legenda-item">
            <svg viewBox="0 0 120 50" class="legenda-svg">
              <rect x="2" y="2" width="116" height="46" rx="14" ry="14" class="forma forma-terminador"/>
              <text x="60" y="30" class="texto-legenda">Início / Fim</text>
            </svg>
            <span>Início ou fim do fluxo</span>
          </div>
          <div class="legenda-item">
            <svg viewBox="0 0 120 50" class="legenda-svg">
              <line x1="6" y1="25" x2="108" y2="25" stroke="#2d3142" stroke-width="2.5"/>
              <path d="M 108 25 L 100 20 L 100 30 Z" fill="#2d3142"/>
              <text x="60" y="14" class="texto-legenda" style="font-size:10px">Relação</text>
            </svg>
            <span>Direção do fluxo</span>
          </div>
          <div class="legenda-item">
            <svg viewBox="0 0 120 50" class="legenda-svg">
              <rect x="2" y="2" width="116" height="46" class="forma forma-processo"/>
              <text x="60" y="30" class="texto-legenda">Processo</text>
            </svg>
            <span>Tarefa ou instrução</span>
          </div>
          <div class="legenda-item">
            <svg viewBox="0 0 120 50" class="legenda-svg">
              <polygon points="14,2 118,2 106,48 2,48" class="forma forma-io"/>
              <text x="60" y="30" class="texto-legenda">Dados</text>
            </svg>
            <span>Entrada ou saída de dados</span>
          </div>
          <div class="legenda-item">
            <svg viewBox="0 0 120 50" class="legenda-svg">
              <polygon points="60,2 118,25 60,48 2,25" class="forma forma-decisao"/>
              <text x="60" y="30" class="texto-legenda">Decisão</text>
            </svg>
            <span>Pergunta ou ramificação</span>
          </div>
        </div>
      </section>

      <div class="fluxograma-area" id="fluxograma-area">
        <!-- O SVG do fluxograma será injetado aqui via JS -->
      </div>

    </div>
  </main>

  <!-- jsPDF servido LOCALMENTE (de 'self'): a CSP estrita do servidor bloqueia
       scripts de CDN externo e scripts inline. Servir local mantem a CSP forte e
       elimina a dependencia de internet/CDN para gerar o PDF. -->
  <script src="../vendor/jspdf.umd.min.js"></script>
  <script src="fluxograma-jogo.js"></script>
  <script src="../download.js"></script>
</body>
</html>
